<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - __DASHBOARD_TITLE__</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sand: "#f7f1e5",
            clay: "#cc5a2e",
            moss: "#1f7a6a",
            ink: "#17313b"
          },
          boxShadow: {
            soft: "0 24px 70px rgba(23,49,59,.16)"
          },
          fontFamily: {
            display: ["Georgia", "serif"],
            body: ["Georgia", "serif"]
          }
        }
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,rgba(204,90,46,.18),transparent_30%),radial-gradient(circle_at_bottom_right,rgba(31,122,106,.14),transparent_28%),linear-gradient(135deg,#f7f1e5,#dce7e2)] font-body text-ink">
  <main class="grid min-h-screen place-items-center px-5">
    <section
      x-data="loginApp()"
      class="w-full max-w-md rounded-[2rem] border border-white/70 bg-white/80 p-8 shadow-soft backdrop-blur-xl"
    >
      <span class="inline-flex rounded-full bg-clay/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-clay">
        Protected Dashboard
      </span>
      <div class="mt-5 space-y-3">
        <h1 class="font-display text-4xl leading-none tracking-tight sm:text-5xl">__DASHBOARD_TITLE__</h1>
        <p class="text-sm leading-7 text-ink/60">
          Masuk dulu untuk membuka dashboard, melihat output bot, dan mengelola semua notifikasi dari satu tempat.
        </p>
      </div>

      <form class="mt-8 space-y-4" @submit.prevent="submit()">
        <label class="block text-sm text-ink/60">
          Username
          <input x-model="form.username" autocomplete="username" class="mt-2 w-full rounded-2xl border border-ink/10 bg-white px-4 py-3 outline-none transition focus:border-clay" required>
        </label>
        <label class="block text-sm text-ink/60">
          Password
          <input x-model="form.password" type="password" autocomplete="current-password" class="mt-2 w-full rounded-2xl border border-ink/10 bg-white px-4 py-3 outline-none transition focus:border-clay" required>
        </label>
        <div class="min-h-6 text-sm text-clay" x-text="error"></div>
        <button class="w-full rounded-full bg-gradient-to-r from-clay to-orange-400 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-clay/20 transition hover:-translate-y-0.5">
          <span x-show="!submitting">Masuk</span>
          <span x-show="submitting">Memproses...</span>
        </button>
      </form>

      <p class="mt-6 text-xs leading-6 text-ink/50">
        Gunakan <code>AUTH_USERNAME</code> dan <code>AUTH_PASSWORD</code> di environment untuk mengganti kredensial default.
      </p>
    </section>
  </main>

  <script>
    function loginApp() {
      return {
        form: {
          username: "",
          password: "",
        },
        error: "",
        submitting: false,

        async api(path, options = {}) {
          const response = await fetch(path, {
            ...options,
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json",
              ...(options.headers || {}),
            },
          });

          const payload = await response.json();
          if (!response.ok || !payload.success) {
            throw new Error(payload.error || "Request failed");
          }

          return payload.data;
        },

        async submit() {
          this.error = "";
          this.submitting = true;
          try {
            await this.api("/api/auth/login", {
              method: "POST",
              body: JSON.stringify(this.form),
            });
            window.location.href = "/dashboard";
          } catch (error) {
            this.error = error.message;
          } finally {
            this.submitting = false;
          }
        },
      };
    }
  </script>
</body>
</html>
